stages:
  - deploy

deploy_to_cloud_run:
  stage: deploy
  image: google/cloud-sdk:alpine
  only:
    - main
  before_script:
    # Authenticate with Google Cloud using the Service Account Key JSON variable
    - echo "$GCP_SERVICE_KEY" > gcp-key.json
    - gcloud auth activate-service-account --key-file=gcp-key.json
    - gcloud config set project $GCP_PROJECT_ID
  script:
    # Submit build to Google Cloud Build
    - gcloud builds submit --tag gcr.io/$GCP_PROJECT_ID/arise-app:$CI_COMMIT_SHA
    # Deploy to Google Cloud Run, capturing the URL
    - CLOUD_RUN_URL=$(gcloud run deploy arise-app --image gcr.io/$GCP_PROJECT_ID/arise-app:$CI_COMMIT_SHA --platform managed --region us-central1 --allow-unauthenticated --format="value(status.url)")
    - echo "CLOUD_RUN_URL=$CLOUD_RUN_URL" > deploy.env
  after_script:
    - rm -f gcp-key.json
  artifacts:
    reports:
      dotenv: deploy.env
  environment:
    name: production
    url: $CLOUD_RUN_URL
